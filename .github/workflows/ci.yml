name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Build must not require real secrets. env.ts validates DATABASE_URL
          # and AUTH_SECRET at import time, so we provide harmless placeholders
          # that are only good enough to pass the string-length check.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          AUTH_SECRET: ci-placeholder-secret-not-used-at-build
