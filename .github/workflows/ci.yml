name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
        env:
          # Build must not require real secrets; provide harmless placeholders.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          AUTH_SECRET: ci-placeholder-secret-not-used-at-build
